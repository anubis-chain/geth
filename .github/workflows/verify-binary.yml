name: Verify binary

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify checksum
        run: sha256sum --check checksums/SHA256SUMS

      - name: Verify executable format
        run: |
          test -x bin/geth
          file bin/geth | grep -q "ELF 64-bit LSB executable"
